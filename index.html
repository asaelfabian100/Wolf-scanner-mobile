<!--
Archivo: index.html
Mejora: Capturar UPC compacto en Entradas

REEMPLAZAR la celda/bloque actual donde aparece el botón "Capturar UPC"
por este bloque dentro de cada línea de entrada.

IMPORTANTE:
- Cambia {{LINE_ID}} por el id real de la línea.
- El input UPC de la misma línea debe tener data-upc-input="{{LINE_ID}}".
-->

<td class="scan-cell">
  <div class="upc-scan-slot" data-scanner-slot="{{LINE_ID}}">
    <button
      type="button"
      class="btn-upc-scan"
      onclick="openInlineUPCScanner('{{LINE_ID}}')"
    >
      Capturar UPC
    </button>
  </div>
</td>
